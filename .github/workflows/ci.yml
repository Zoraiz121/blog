cat > .github/workflows/ci.yml <<'YAML'
name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  scan_ruby:
    name: Ruby Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"
          bundler: "2.6.9"
          bundler-cache: true

      - name: Scan Rails security vulnerabilities
        run: bundle exec brakeman --no-pager --no-exit-on-warn

  scan_js:
    name: JavaScript Dependency Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"
          bundler: "2.6.9"
          bundler-cache: true

      - name: Scan JavaScript dependencies
        run: bin/importmap audit

  lint:
    name: Ruby Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"
          bundler: "2.6.9"
          bundler-cache: true

      - name: Lint Ruby code
        run: bundle exec rubocop -f github

  test:
    name: Rails Tests
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y \
            google-chrome-stable \
            libjemalloc2 \
            libvips \
            sqlite3

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.1.3"
          bundler: "2.6.9"
          bundler-cache: true

      - name: Prepare test database
        run: bundle exec rails db:test:prepare

      - name: Run unit and integration tests
        run: bundle exec rails test

      - name: Run system tests
        run: bundle exec rails test:system

      - name: Upload failed system-test screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: system-test-screenshots
          path: tmp/screenshots
          if-no-files-found: ignore
YAML
